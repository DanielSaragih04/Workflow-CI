name: Training Model

on:
  push:
    branches:
      - main

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas
          pip install numpy
          pip install scikit-learn
          pip install mlflow
          pip install joblib

      # Menjalankan training model menggunakan MLflow Project
      - name: Run Training
        run: |
          cd MLProject
          mlflow run . --env-manager=local

      # Upload artifact hasil training
      - name: Upload MLflow Artifact
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: MLProject/model

      # Build Docker Image
      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t danielsaragih/diabetes-mlflow:latest ./MLProject

      - name: Push Docker Image
        run: |
          docker push danielsaragih/diabetes-mlflow:latest