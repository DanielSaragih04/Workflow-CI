name: Training Model

on:
  push:
    branches:
      - main

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
      # Checkout repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Install dependencies
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas
          pip install numpy
          pip install scikit-learn
          pip install mlflow
          pip install joblib

      # Menjalankan training model
      - name: Run Training
        run: |
          cd MLProject
          python modelling.py

      # Upload artifact hasil training
      - name: Upload MLflow Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-results
          path: MLProject/mlruns

      # Build Docker Image
      - name: Build Docker Image
        run: |
          docker build -t diabetes-model ./MLProject